# exists on either repo yet, and beta03 is NOT on Maven Central, so this is the latest
# DURABLE (fetchable-by-name tag) ref. VENDORED (native) side only: the JVM parity leg's
# Maven forcing (compose 1.12.0-beta02 / m3 1.12.0-alpha03, latest PUBLISHED) stays put --
# a documented native(beta03+dev) vs JVM(beta02) skew until beta03 hits Maven Central, at
# which point bump the vComposeJvmVersion forcing in demo/apidemo/material-symbols to match.
COMPOSE_CORE_REF=v1.12.0-beta03+dev4483

# JetBrains/compose-multiplatform  (umbrella repo -- :components-resources runtime)
COMPOSE_REF=v1.12.0-beta03+dev4483
