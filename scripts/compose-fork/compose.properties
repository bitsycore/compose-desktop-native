# Pinned upstream refs for the vendored Compose sources. Referenced from each
# module's compose-fork.txt as SET_REPO=<url>@<VARNAME>. Bump a ref here and
# re-run scripts/compose-fork/sync.sh to re-sync everything to it.

# JetBrains/compose-multiplatform-core -- pinned to the durable TAG (fetchable by name
# from any fresh clone, unlike a bare unreferenced SHA which upstream could GC).
# Matching Maven artifacts: core groups 1.12.0-beta02, material3 1.12.0-alpha03
# (m3 rides its own release train) -- keep the vComposeJvmVersion forcing in
# demo/apidemo/material-symbols build files in lockstep with this pin.
COMPOSE_CORE_REF=v1.12.0-beta02

# JetBrains/compose-multiplatform  (umbrella repo -- :components-resources runtime)
COMPOSE_REF=v1.12.0-beta02
