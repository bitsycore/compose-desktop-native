name: Build apps

# CI-only build: linuxX64 / linuxArm64 / macosArm64 / mingwX64. Verifies the
# demo + apidemo executables + data.kres link for every target on every
# push/PR against a branch.
#
# Tag pushes (semver) are handled by release.yml — that workflow does the
# same build + zips + publishes + attaches to a GitHub Release. `build.yml`
# skips tag events so we don't run the same matrix twice.

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linuxX64
            os: ubuntu-24.04
            gradle: LinuxX64
            multiarch: x86_64-linux-gnu
          - target: linuxArm64
            os: ubuntu-24.04-arm
            gradle: LinuxArm64
            multiarch: aarch64-linux-gnu
          - target: macosArm64
            os: macos-14
            gradle: MacosArm64
          - target: mingwX64
            os: windows-2022
            gradle: MingwX64
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # ---------------- Linux (x64 + arm64) ----------------
      # macOS/Linux CI builds the Skia renderer only. SDL3 is kept as a
      # dev-only target on those hosts (turn on with `-Prenderer=sdl3`
      # locally) — the sdl3_ttf / sdl3_image / freetype cinterops aren't
      # created when the SDL3 renderer isn't active for the target
      # (see :ui/build.gradle.kts). Skia/Skiko links fontconfig + GL + X11.
      - name: Install Linux deps (SDL3 + Skia system libs)
        if: runner.os == 'Linux'
        env:
          SDL_REF: release-3.4.10
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig-dev libgl-dev libx11-dev libxext-dev libxrandr-dev \
            libxi-dev libxcursor-dev libxinerama-dev
          if sudo apt-get install -y libsdl3-dev; then
            echo "::notice::Using distro libsdl3-dev"
          else
            echo "::notice::libsdl3-dev not in apt — building SDL3 $SDL_REF from source"
            sudo apt-get install -y --no-install-recommends cmake ninja-build pkg-config \
              libxfixes-dev libxss-dev libxtst-dev libxkbcommon-dev
            git clone --depth 1 -b "$SDL_REF" https://github.com/libsdl-org/SDL.git /tmp/SDL
            cmake -S /tmp/SDL -B /tmp/SDL/build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=ON -DSDL_STATIC=OFF \
              -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF \
              -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_LIBDIR=lib/${{ matrix.multiarch }}
            cmake --build /tmp/SDL/build
            sudo cmake --install /tmp/SDL/build
            sudo ldconfig
          fi

      # ---------------- macOS ----------------
      - name: Install macOS deps (SDL3)
        if: runner.os == 'macOS'
        run: brew install sdl3

      # ---------------- Windows (static libs) ----------------
      # The mingwX64 build links SDL3 / SDL3_ttf / SDL3_image / FreeType
      # statically (clean <app>.exe + data.kres). tools/build-all.sh builds them
      # from source with Kotlin/Native's OWN bundled mingw gcc (9.2) so the libs
      # match the CRT K/N links them against — a newer host gcc (11+) emits
      # __intrinsic_setjmpex, which K/N's bundled mingw doesn't define.
      - name: Cache Windows static libs (libs/)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: libs
          key: winlibs-${{ hashFiles('tools/**') }}-v2

      # build-all.sh wants K/N's mingw, normally fetched lazily by the first
      # mingw cinterop — but that needs libs/ (circular). Fetch the exact bundle
      # K/N 2.4 uses up front (skipped if a ~/.konan cache already has it).
      - name: Pre-fetch Kotlin/Native mingw toolchain
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dep = Join-Path $HOME ".konan/dependencies"
          $have = Get-ChildItem -Path $dep -Recurse -Filter gcc.exe -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -match 'mingw' }
          if (-not $have) {
            New-Item -ItemType Directory -Force -Path $dep | Out-Null
            $zip = Join-Path $env:RUNNER_TEMP "knmingw.zip"
            Invoke-WebRequest -Uri "https://download.jetbrains.com/kotlin/native/msys2-mingw-w64-x86_64-2.zip" -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath $dep -Force
          }
          Get-ChildItem -Path $dep -Recurse -Filter gcc.exe | Where-Object { $_.FullName -match 'mingw' } | Select-Object -First 1 -ExpandProperty FullName

      - name: Build Windows static deps (libs/)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [ -f libs/SDL3/lib/libSDL3.a ]; then echo "libs/ restored from cache"; exit 0; fi
          tools/build-all.sh   # picks K/N's bundled mingw gcc (see the script)

      # ---------------- Build ----------------
      - name: Build demo + apidemo (${{ matrix.target }})
        shell: bash
        run: |
          ./gradlew --no-daemon -PsubsetIcons=false \
            :demo:linkReleaseExecutable${{ matrix.gradle }} \
            :apidemo:linkReleaseExecutable${{ matrix.gradle }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist/demo dist/apidemo
          cp -r demo/build/bin/${{ matrix.target }}/releaseExecutable/. dist/demo/
          cp -r apidemo/build/bin/${{ matrix.target }}/releaseExecutable/. dist/apidemo/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist
          if-no-files-found: error
