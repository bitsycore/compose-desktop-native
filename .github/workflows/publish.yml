name: Publish

# Only runs when a version tag is pushed (e.g. `git tag v1.2.3 && git push --tags`).
# `github.ref_name` is passed to Gradle as PUBLISH_VERSION; the root build strips
# the leading `v` before setting each subproject's `version`.
on:
  push:
    tags:
      - 'v*'

# Never overlap two publish runs for the same tag.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    strategy:
      fail-fast: false
      # Each host runs only the publish tasks Gradle actually generated for it.
      # macOS also publishes the shared kotlinMultiplatform metadata module.
      # No library module declares jvm() today — apps do their own JVM parity
      # build against upstream Compose, so JVM isn't part of the publication.
      # `target` is the Gradle K/N target token (Capitalised) — one per host,
      # used for :demo / :apidemo linkReleaseExecutable<Target>. linuxArm64 is
      # skipped for the app build because SDL3 static libs on the ubuntu runner
      # are host-arch only; cross-compile would fail at link time.
      matrix:
        include:
          - runner: macos-14
            host: macos
            target: MacosArm64
            exe_ext: kexe
            tasks: >-
              publishKotlinMultiplatformPublicationToGitHubPackagesRepository
              publishMacosArm64PublicationToGitHubPackagesRepository
          - runner: ubuntu-22.04
            host: linux
            target: LinuxX64
            exe_ext: kexe
            tasks: >-
              publishLinuxX64PublicationToGitHubPackagesRepository
              publishLinuxArm64PublicationToGitHubPackagesRepository
          - runner: windows-2022
            host: windows
            target: MingwX64
            exe_ext: exe
            tasks: >-
              publishMingwX64PublicationToGitHubPackagesRepository

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: write   # attach release binaries to the tag's GitHub Release
      packages: write   # publish Maven artifacts to GitHub Packages

    env:
      PUBLISH_VERSION: ${{ github.ref_name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # SDL3's Linux static build needs the host graphics / audio / input dev
      # headers so its CMake configure can pick up wayland / X11 / ALSA / etc.
      # libxtst-dev is required whenever X11 is enabled (SDL3 gates XTEST behind
      # a hard-error unless -DSDL_X11_XTEST=OFF is passed).
      - name: Install Linux SDL build deps
        if: matrix.host == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxss-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxtst-dev \
            libwayland-dev wayland-protocols \
            libgl1-mesa-dev libegl1-mesa-dev \
            libasound2-dev libpulse-dev libudev-dev \
            libdbus-1-dev libibus-1.0-dev \
            libfontconfig-dev

      # windows-2022 runners pre-install Chocolatey's mingw-w64 at C:\mingw64.
      # SDL3 >= 3.4 needs a C++ compiler for its GameInput backend (K/N's
      # bundled mingw is C-only) — this pre-install covers that. The setjmp
      # intrinsic K/N's LLD can't resolve is aliased to msvcrt's _setjmpex at
      # link time via --defsym in sdl3.def.

      # Build static SDL3 / SDL3_ttf / SDL3_image / FreeType from
      # scripts/build-sdl/build-sdl.properties. Cached against the manifest +
      # scripts so version bumps invalidate cleanly.
      # `cache_version` is a manual bump for when the toolchain (runner OS,
      # compiler flavour, K/N sysroot expectations) changes without any
      # scripts/build-sdl/ file changing. Increment to force a rebuild.
      - name: Cache libs/
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: libs
          key: sdl-libs-v2-${{ matrix.host }}-${{ hashFiles('scripts/build-sdl/**') }}

      - name: Build static SDL / TTF / image / FreeType
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/build-sdl/build-all.sh

      # src/vendor/ trees are gitignored — a fresh checkout has zero vendored
      # androidx.compose.* files. Sync copies them in from the upstream refs
      # pinned in scripts/compose-fork/compose.properties. Needs python3 + git;
      # both are pre-installed on every runner.
      - name: Sync vendored Compose code
        shell: bash
        run: bash scripts/compose-fork/sync.sh

      # GitHub Packages sometimes returns 409 Conflict on a fresh upload when
      # the same coordinate was recently deleted (soft-delete propagation).
      # `--continue` lets Gradle finish the rest of the publish tasks past a
      # single 409, and the outer retry re-runs the whole thing (Gradle skips
      # already-uploaded artifacts). Two attempts is enough for the transient
      # cases we've hit; the third pass falls through as a hard failure.
      - name: Publish to GitHub Packages
        shell: bash
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "::group::Publish attempt $attempt"
            if ./gradlew ${{ matrix.tasks }} --continue --no-daemon --stacktrace; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            [ $attempt -lt 3 ] && { echo "::warning::Publish attempt $attempt failed — sleeping 60s and retrying"; sleep 60; }
          done
          echo "::error::Publish failed after 3 attempts"
          exit 1

      # Release binaries for the host target — the binary plus the data.kres
      # (bundled composeResources + fonts + subset icon-font). Each :demo /
      # :apidemo has its linkReleaseExecutable<Target> task wired to auto-run
      # the matching copy<Variant>ComposeResources<Target> so data.kres is
      # produced next to the .kexe / .exe. On Linux only linuxX64 is built —
      # linuxArm64 is skipped since the SDL3 static libs on the ubuntu runner
      # are host-arch (x64).
      - name: Build demo + apidemo release binaries
        shell: bash
        run: |
          ./gradlew \
            ":demo:linkReleaseExecutable${{ matrix.target }}" \
            ":apidemo:linkReleaseExecutable${{ matrix.target }}" \
            --no-daemon --stacktrace

      - name: Package demo + apidemo into zips
        shell: bash
        run: |
          set -euo pipefail
          # Lower-case first letter — gradle target tokens are Capitalised but
          # the build/bin dir uses the plain target name (macosArm64 etc).
          target_dir=$(echo "${{ matrix.target }}" | awk '{print tolower(substr($0,1,1)) substr($0,2)}')
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          # Windows Git Bash has no `zip`; every runner has JDK 21 → use `jar cf`
          # which writes a valid ZIP file. `-C dir file` = enter dir then add
          # `file` at the archive root, so the archive stays flat like `zip -j`.
          for app in demo apidemo; do
            src="$app/build/bin/$target_dir/releaseExecutable"
            zip_path="$(pwd)/dist/$app-$version-$target_dir.zip"
            jar --create --no-manifest --file "$zip_path" \
              -C "$src" "$app.${{ matrix.exe_ext }}" \
              -C "$src" "data.kres"
          done
          ls -la dist/

      - name: Attach demo + apidemo zips to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.zip
          fail_on_unmatched_files: true
